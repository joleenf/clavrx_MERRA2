# source is nrl.
url:
  f"https://www.usgodae.org/ftp/outgoing/fnmoc/models/navgem_0.5/{start_time:%Y}/{start_time:%Y%m%d%H}"
# a list of dataset keys, either type of level, shortname or some other searchable parameter,
# These are extracted using cfgrib "filter_by_key" parameter
# done here so that code reads file only once per filter key (dataset), which is replicated for various data arrays.
datasets:
   isobaricInhPa:
     typeOfLevel: isobaricInhPa
     shortName: t
   cape:
     typeOfLevel: surface
     shortName: unknown
     stepType: instant
   u-wind:
     typeOfLevel: isobaricInhPa
     shortName: u
   maxWind:
     typeOfLevel: maxWind
     stepType: instant
   v-wind:
     typeOfLevel: isobaricInhPa
     shortName: v
   gh:
     typeOfLevel: isobaricInhPa
     shortName: gh
   surfaceHeight:
     typeOfLevel: isobaricInhPa
     shortName: gh
     level: 1013
   tropopause:
     typeOfLevel: tropopause
   msl:
     stepType: instant
     typeOfLevel: meanSea
     shortName: msl
   snow_depth:
     stepType: instant
     typeOfLevel: surface
     shortName: sde
   temperatureAt2m:
     stepType: instant
     typeOfLevel: heightAboveGround
     shortName: 2t
   surfaceTemperature:
     typeOfLevel: isobaricInhPa
     shortName: t
     level: 1013
   surfacePressure:
     stepType: instant
     typeOfLevel: surface
     shortName: sp
   tpw:
     stepType: instant
     typeOfLevel: surface
     shortName: pwat
   rh:
      typeOfLevel: isobaricInhPa
      shortName: r
   gfs_grib:
      # format keys, then the directory where the data from that format is stored, followed by file_pattern
      directory: f"/apollo/cloud/Ancil_Data/clavrx_ancil_data/dynamic/gfs_grib"
      # directory: f"/Users/joleenf/data/clavrx/ozone/gfs/{start_time:%Y}"
      file_pattern: f"gfs.{start_time:%Y%m%d}.t{model_init_hour}z.pgrb2f12"
      o3mr:
         typeOfLevel: isobaricInhPa
         shortName: o3mr
      sdwe:
         typeOfLevel: surface
         shortName: sdwe

# dataset key for data_array should match the appropriate 'datasets' key matching
# the filter_by_key={'type_of_level': something, 'shortName': something}
# that extract a possibly larger dataset containing the individual
# data arrays needed for CLAVRx input variables defined in 'data_arrays' here.
# long_name is not required, unless a change is needed from the input data (for example, total_ozone
# has a long_name of 'unknown' and that is not super helpful information.
data_arrays:
  MSL pressure:
    dataset: msl
    cfVarName: msl
    ndims_out: 2
    out_units: hPa
    units_fn: !!python/name:conversions.pa_to_hPa
  lat:
    dataset: isobaricInhPa
    cfVarName: latitude
    ndims_out: 1
    out_units: Null
    units_fn: !!python/name:conversions.no_conversion
  level:
    dataset: isobaricInhPa
    cfVarName: isobaricInhPa
    ndims_out: 1
    out_units: hPa
    units_fn: !!python/name:conversions.no_conversion
  lon:
    dataset: isobaricInhPa
    cfVarName: longitude
    ndims_out: 1
    out_units: Null
    long_name: longitude
    units_fn: !!python/name:conversions.no_conversion
  pressure levels:
    dataset: isobaricInhPa
    cfVarName: isobaricInhPa
    ndims_out: 1
    out_units: hPa
    units_fn: !!python/name:conversions.no_conversion
  cape:
    dataset: cape
    cfVarName: unknown
    ndims_out: 2
    units_fn: !!python/name:conversions.no_conversion
  o3mr:
    dataset: gfs_grib
    cfVarName: o3mr
    ndims_out: 3
    out_units: kg/kg
    nan_fill: False
    long_name: ozone_mixing_ratio
    units_fn: !!python/name:conversions.no_conversion
  rh:
    dataset: rh
    cfVarName: r
    ndims_out: 3
    out_units: "%"
    units_fn: !!python/name:conversions.no_conversion
  temperature at sigma=0.995:
    dataset: temperatureAt2m
    cfVarName: t2m
    ndims_out: 2
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
  surface temperature:
    dataset: surfaceTemperature
    cfVarName: t
    ndims_out: 2
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
  height:
    dataset: gh
    cfVarName: gh
    ndims_out: 3
    out_units: km
    units_fn: !!python/name:conversions.meter_to_km
  surface height:
    dataset: surfaceHeight
    cfVarName: gh
    ndims_out: 2
    out_units: km
    units_fn: !!python/name:conversions.meter_to_km
  cape:
    dataset: cape
    cfVarName: unknown 
    ndims_out: 2
    out_units: J/kg 
    units_fn: !!python/name:conversions.no_conversion
  surface pressure:
    dataset: surfacePressure
    cfVarName: sp
    ndims_out: 2
    out_units: hPa
    units_fn: !!python/name:conversions.pa_to_hPa
  temperature:
    dataset: isobaricInhPa
    cfVarName: t
    ndims_out: 3
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
  total precipitable water:
    dataset: tpw
    cfVarName: p3054
    ndims_out: 2
    out_units: cm
    units_fn: !!python/name:conversions.km_per_square_meter_to_cm
  u-wind:
    dataset: u-wind
    cfVarName: u
    ndims_out: 3
    out_units: m/s
    units_fn: !!python/name:conversions.no_conversion
  v-wind:
    dataset: v-wind
    cfVarName: v
    ndims_out: 3
    out_units: m/s
    units_fn: !!python/name:conversions.no_conversion
  u-wind at sigma=0.995:
    dataset: maxWind
    cfVarName: u
    ndims_out: 2
    out_units: m/s
    units_fn: !!python/name:conversions.no_conversion
  v-wind at sigma=0.995:
    dataset: maxWind
    cfVarName: v
    ndims_out: 2
    out_units: m/s
    units_fn: !!python/name:conversions.no_conversion
  water equivalent snow depth:
    dataset: gfs_grib
    cfVarName: sdwe
    ndims_out: 2
    out_units: m of water equivalent
    units_fn: !!python/name:conversions.no_conversion
  tropopause pressure:
    dataset: tropopause
    cfVarName: pres
    ndims_out: 2
    out_units: hPa
    units_fn: !!python/name:conversions.pa_to_hPa
  tropopause temperature:
    dataset: tropopause
    cfVarName: t
    ndims_out: 2
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
