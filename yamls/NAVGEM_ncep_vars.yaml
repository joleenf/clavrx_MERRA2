# source is ncep.
url:
  f"https://nomads.ncep.noaa.gov/pub/data/nccf/com/fnmoc/prod/navgem.{start_time:%Y%m%d}"
defined levels:
  hPa_levels: [1000, 925, 850, 700, 500, 400, 300, 250, 200, 150, 100, 70]
  rh_hPa_levels: [1000, 950, 900, 850, 800, 750, 700, 650, 600, 550, 500, 450, 400, 350, 300]

# a list of dataset keys, either type of level, shortname or some other searchable parameter,
# These are extracted using cfgrib "filter_by_key" parameter
# done here so that code reads file only once per filter key (dataset), which is replicated for various data arrays.
datasets:
   meanSea:
      typeOfLevel: meanSea
   isobaricInhPa:
      typeOfLevel: isobaricInhPa
   tropopause:
      typeOfLevel: tropopause
   surface:
      typeOfLevel: heightAboveGround
   rh:
      shortName: r

data_arrays:
  MSL pressure:
    dataset: meanSea   # this should match a dataset key above
    shortname: prmsl
    ndims_out: 2
    out_units: hPa
    units_fn: !!python/name:conversions.pa_to_hPa
  lat:
    dataset: isobaricInhPa
    shortname: latitude
    ndims_out: 1
    out_units: Null
    units_fn: !!python/name:conversions.no_conversion
  level:
    dataset: isobaricInhPa
    shortname: isobaricInhPa
    ndims_out: 1
    out_units: hPa
    units_fn: !!python/name:conversions.no_conversion
  lon:
    dataset: isobaricInhPa
    shortname: longitude
    ndims_out: 1
    out_units: Null
    units_fn: !!python/name:conversions.no_conversion
  pressure levels:
    dataset: isobaricInhPa
    shortname: isobaricInhPa
    ndims_out: 1
    out_units: hPa
    units_fn: !!python/name:conversions.no_conversion
  rh:
    dataset: r
    filter_by_keys:
        shortName: r
    shortname: r
    ndims_out: 3
    out_units: "%"
    units_fn: !!python/name:conversions.no_conversion
  # TODO:  Not sure if this exists in this dataset.
  surface temperature:
    dataset: surface
    shortname: t2m
    ndims_out: 2
    out_units: hPa
    units_fn: !!python/name:conversions.pa_to_hPa
  height:
    dataset: isobaricInhPa
    shortname: gh
    ndims_out: 3
    out_units: gpm
    units_fn: !!python/name:conversions.no_conversion
  # TODO:  Not sure if this exists in this dataset.
  #surface pressure:
  #  dataset: navgem
  #  shortname: None
  #  ndims_out: 2
  #  out_units: K
  #  units_fn: !!python/name:conversions.no_conversion
  temperature:
    dataset: isobaricInhPa
    shortname: t
    ndims_out: 3
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
  # TODO:  Not in files or parameter documentation... only total ozone:  parm_id=0010, but no param_name so probably
  #        can't be accessed.
  #o3mr:
