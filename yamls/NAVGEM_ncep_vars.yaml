  #  shortname: o3
  #  out_units: kg/kg
  #  units_fn: !!python/name:conversions.no_conversion
  #  nan_fill: True
  #  ndims_out: 3
  ## TODO: Documentation states parm_id=0054 and param_name=prcp_h20, but not found in real-time data or ncep file.
  #total precipitable water:
  #  dataset: US0058GMET.prcp_h20
  #  shortname: p3054
  #  ndims_out: 2
  #  out_units: cm
  #  units_fn: !!python/name:conversions.meter_to_km
  u-wind:
    dataset: isobaricInhPa
    shortname: u
    ndims_out: 3
    out_units: m/s
    units_fn: !!python/name:conversions.no_conversion
  v-wind:
    dataset: isobaricInhPa
    shortname: v
