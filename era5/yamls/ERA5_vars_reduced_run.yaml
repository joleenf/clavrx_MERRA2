defined levels:
  hPa_levels: [1000, 975, 950, 925, 900, 875, 850, 825, 800, 775, 750, 700, 650, 600, 550, 500, 450, 400, 350, 300, 250, 225, 200, 175, 150, 125, 100, 70, 50, 30, 20, 10, 7, 5, 3, 2, 1]
  potential temperature: [265, 275, 285, 300, 315, 320, 330, 350, 370, 395, 430, 475, 530, 600, 700, 850]

MSL pressure:
  in_file: singleLevel
  shortname: msl
  ndims_out: 2
  out_units: hPa
  units_fn: !!python/name:conversions.pa_to_hPa
temperature at sigma=0.995:
  in_file: singleLevel
  shortname: t2m
  ndims_out: 2
  out_units: K
  units_fn: !!python/name:conversions.no_conversion
dewpoint temperature at sigma=0.995:
  in_file: singleLevel
  shortname: d2m
  ndims_out: 2
  out_units: K
  units_fn: !!python/name:conversions.no_conversion
rh at sigma=0.995:
  in_file: singleLevel
  shortname: t2m
  ndims_out: 2
  out_units: "%"
  units_fn:  !!python/name:conversions.no_conversion
ice fraction:
  in_file: singleLevel
  shortname: siconc
  ndims_out: 2
  out_units: none
  units_fn: !!python/name:conversions.no_conversion
lat:
  in_file: pressureLevels
  shortname: latitude
  ndims_out: 1
  out_units: Null
  units_fn: !!python/name:conversions.no_conversion
level:
  in_file: pressureLevels
  shortname: level
  ndims_out: 1
  out_units: hPa
  units_fn: !!python/name:conversions.no_conversion
lon:
  in_file: pressureLevels
  shortname: longitude
  ndims_out: 1
  out_units: Null
  units_fn: !!python/name:conversions.no_conversion
