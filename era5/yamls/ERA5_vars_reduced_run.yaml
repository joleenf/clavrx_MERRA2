tropopause:
  # unfortunately this is a break from the previous paradigm.  Did not anticipate this type of nested calculation
    in_file: pressureLevels
    shortname: t
    ndims_out: 2
    nan_fill: False
    out_units: K
    units_fn: !!python/name:conversions.no_conversion
    dependent: # dependent variables do not apply conversion.
      plevels:
        in_file: pressureLevels
        shortname: level
        ndims_out: 1
        out_units: hPa
        nan_fill: False
        units_fn: !!python/name:conversions.no_conversion
